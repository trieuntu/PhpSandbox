services:
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${NGINX_HOST_PORT:-8081}:80"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - .:/var/www/html:ro
    depends_on:
      - app
    networks:
      - frontend
    restart: unless-stopped

  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-"PHP Sandbox"}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-phpsandbox}
      DB_USERNAME: ${DB_USERNAME:-phpsandbox_app}
      DB_PASSWORD: ${DB_PASSWORD:-app_password}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      REDIS_PORT: 6379
      CACHE_DRIVER: ${CACHE_DRIVER:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@phpsandbox.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-"PHP Sandbox"}
      SANDBOX_HOST: ${SANDBOX_HOST:-http://sandbox:8080}
      SANDBOX_MAX_EXECUTION_TIME: ${SANDBOX_MAX_EXECUTION_TIME:-5}
      SANDBOX_MEMORY_LIMIT_MB: ${SANDBOX_MEMORY_LIMIT_MB:-64}
      SANDBOX_DB_ADMIN_USER: ${SANDBOX_DB_ADMIN_USER:-sandbox_admin}
      SANDBOX_DB_ADMIN_PASS: ${SANDBOX_DB_ADMIN_PASS:-sandbox_admin_pass}
      SANDBOX_DB_HOST: mysql
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped

  sandbox:
    build:
      context: ./docker/sandbox
      dockerfile: Dockerfile
    volumes:
      - ./sandbox-service:/var/www/sandbox:ro
    networks:
      - sandbox_net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp/sandbox_exec:mode=1777,size=64m

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_DATABASE:-phpsandbox}
      MYSQL_USER: ${DB_USERNAME:-phpsandbox_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-app_password}
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/performance.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
      - sandbox_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - backend
    restart: unless-stopped

  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    command: php artisan queue:work redis --sleep=1 --tries=3 --timeout=60 --max-jobs=1000
    deploy:
      replicas: 3
    environment:
      APP_NAME: ${APP_NAME:-"PHP Sandbox"}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-phpsandbox}
      DB_USERNAME: ${DB_USERNAME:-phpsandbox_app}
      DB_PASSWORD: ${DB_PASSWORD:-app_password}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      REDIS_PORT: 6379
      CACHE_DRIVER: ${CACHE_DRIVER:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  sandbox_net:
    driver: bridge
    internal: true

volumes:
  mysql_data:
  redis_data:
