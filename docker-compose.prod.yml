version: '3.9'

# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro

  app:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_LEVEL: error
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  mysql:
    ports: []  # Remove exposed port in production
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}

  redis:
    ports: []  # Remove exposed port in production (not exposed in base, but kept for clarity)

  mailpit:
    ports: []  # Do not expose mail UI in production

  queue:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_LEVEL: error
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  sandbox:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
