; PHP-FPM pool configuration — www pool

[www]
user  = www-data
group = www-data

; Listen on TCP socket so nginx can connect via service name
listen = 0.0.0.0:9000

; Process manager
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 5
pm.min_spare_servers = 2
pm.max_spare_servers = 10
pm.max_requests      = 500

; Logging
access.log          = /proc/self/fd/2
php_admin_flag[log_errors] = on
php_admin_value[error_log]  = /proc/self/fd/2

; Timeouts
request_terminate_timeout = 60s

; Ensure correct environment variables are passed through
clear_env = no
