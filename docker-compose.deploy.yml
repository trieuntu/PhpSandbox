version: '3.9'

# =============================================================================
# PHP Sandbox – Deployment Compose (pull & run from Docker Hub)
# Usage on Ubuntu server:
#   1. Copy this file + .env to server
#   2. docker compose -f docker-compose.deploy.yml --env-file .env up -d
# =============================================================================

x-app-env: &app-env
  APP_NAME: ${APP_NAME:-"PHP Sandbox"}
  APP_ENV: ${APP_ENV:-production}
  APP_KEY: ${APP_KEY}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_URL: ${APP_URL:-http://localhost}
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: ${DB_DATABASE:-phpsandbox}
  DB_USERNAME: ${DB_USERNAME:-phpsandbox_app}
  DB_PASSWORD: ${DB_PASSWORD}
  REDIS_HOST: redis
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  REDIS_PORT: 6379
  CACHE_DRIVER: redis
  SESSION_DRIVER: redis
  QUEUE_CONNECTION: redis
  LOG_CHANNEL: stack
  LOG_LEVEL: ${LOG_LEVEL:-error}
  MAIL_MAILER: ${MAIL_MAILER:-smtp}
  MAIL_HOST: ${MAIL_HOST:-mailpit}
  MAIL_PORT: ${MAIL_PORT:-1025}
  MAIL_USERNAME: ${MAIL_USERNAME:-null}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-null}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@phpsandbox.local}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-"PHP Sandbox"}
  SANDBOX_HOST: http://sandbox:8080
  SANDBOX_SECRET: ${SANDBOX_SECRET:-}
  SANDBOX_MAX_EXECUTION_TIME: ${SANDBOX_MAX_EXECUTION_TIME:-5}
  SANDBOX_MEMORY_LIMIT_MB: ${SANDBOX_MEMORY_LIMIT_MB:-64}
  SANDBOX_DB_ADMIN_USER: ${SANDBOX_DB_ADMIN_USER:-sandbox_admin}
  SANDBOX_DB_ADMIN_PASS: ${SANDBOX_DB_ADMIN_PASS}
  SKIP_PUBLIC_SYNC: "1"

services:

  nginx:
    image: ${DOCKER_USER:-phpsandbox}/phpsandbox-nginx:${TAG:-latest}
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - app
    networks:
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  app:
    image: ${DOCKER_USER:-phpsandbox}/phpsandbox-app:${TAG:-latest}
    environment:
      <<: *app-env
    volumes:
      - storage_data:/var/www/html/storage
      - logs_data:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped

  queue:
    image: ${DOCKER_USER:-phpsandbox}/phpsandbox-app:${TAG:-latest}
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=60
    environment:
      <<: *app-env
      SKIP_PUBLIC_SYNC: "1"
    volumes:
      - storage_data:/var/www/html/storage
      - logs_data:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  sandbox:
    image: ${DOCKER_USER:-phpsandbox}/phpsandbox-sandbox:${TAG:-latest}
    environment:
      SANDBOX_SECRET: ${SANDBOX_SECRET:-}
      SANDBOX_DB_ADMIN_USER: ${SANDBOX_DB_ADMIN_USER:-sandbox_admin}
      SANDBOX_DB_ADMIN_PASS: ${SANDBOX_DB_ADMIN_PASS}
      SANDBOX_DB_HOST: mysql
    networks:
      - sandbox_net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp/sandbox_exec:mode=1777,size=64m

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-phpsandbox}
      MYSQL_USER: ${DB_USERNAME:-phpsandbox_app}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend
      - sandbox_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: unless-stopped

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  sandbox_net:
    driver: bridge
    internal: true

volumes:
  mysql_data:
  redis_data:
  storage_data:
  logs_data:
